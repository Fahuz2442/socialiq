services:
  # ─── Backend API ─────────────────────────────────────────────
  - type: web
    name: socialiq-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: socialiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: socialiq-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://socialiq-frontend.onrender.com
      - key: BACKEND_URL
        value: https://socialiq-backend.onrender.com
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # ─── Frontend ─────────────────────────────────────────────────
  - type: web
    name: socialiq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://socialiq-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── Postgres Database ────────────────────────────────────────
databases:
  - name: socialiq-db
    plan: free
    databaseName: socialiq
    user: socialiq_user
